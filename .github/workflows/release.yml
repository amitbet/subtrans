name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      previous: ${{ steps.version.outputs.previous }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"
          if [[ -z "$latest" ]]; then
            next="v0.1.0"
          elif [[ "$latest" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            next="v${major}.${minor}.$((patch + 1))"
          else
            echo "Latest tag '$latest' is not semver-like" >&2
            exit 1
          fi

          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "previous=$latest" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: version
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Windows GUI executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          go build -trimpath -ldflags="-s -w -H=windowsgui -X main.version=${{ needs.version.outputs.version }}" -o dist/subtrans-windows-amd64.exe .

      - name: Upload Windows asset
        uses: actions/upload-artifact@v4
        with:
          name: subtrans-windows-amd64
          path: dist/subtrans-windows-amd64.exe
          if-no-files-found: error

  build-macos:
    needs: version
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build macOS arm64 executable
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          GOARCH=arm64 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ needs.version.outputs.version }}" \
            -o dist/subtrans-darwin-arm64 .
          chmod +x dist/subtrans-darwin-arm64

      - name: Upload macOS asset
        uses: actions/upload-artifact@v4
        with:
          name: subtrans-darwin-arm64
          path: dist/subtrans-darwin-arm64
          if-no-files-found: error

  release:
    needs:
      - version
      - build-windows
      - build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "## Changes"
            echo
            if [[ -n "${{ needs.version.outputs.previous }}" ]]; then
              git log --pretty=format:'- %s (%h)' "${{ needs.version.outputs.previous }}..HEAD"
            else
              git log --pretty=format:'- %s (%h)' HEAD
            fi
            echo
          } > RELEASE_NOTES.md

      - name: Create tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.version.outputs.version }}" -m "${{ needs.version.outputs.version }}"
          git push origin "${{ needs.version.outputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ needs.version.outputs.version }}" \
            dist/subtrans-windows-amd64.exe \
            dist/subtrans-darwin-arm64 \
            --title "${{ needs.version.outputs.version }}" \
            --notes-file RELEASE_NOTES.md
