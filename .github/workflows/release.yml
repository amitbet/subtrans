name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Test
        run: go test ./...

      - name: Compute next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"
          if [[ -z "$latest" ]]; then
            next="v0.1.0"
          elif [[ "$latest" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            next="v${major}.${minor}.$((patch + 1))"
          else
            echo "Latest tag '$latest' is not semver-like" >&2
            exit 1
          fi

          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "previous=$latest" >> "$GITHUB_OUTPUT"

      - name: Build assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          GOOS=windows GOARCH=amd64 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o dist/subtrans-windows-amd64.exe .

          GOOS=darwin GOARCH=arm64 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o dist/subtrans-darwin-arm64 .

          chmod +x dist/subtrans-darwin-arm64

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "## Changes"
            echo
            if [[ -n "${{ steps.version.outputs.previous }}" ]]; then
              git log --pretty=format:'- %s (%h)' "${{ steps.version.outputs.previous }}..HEAD"
            else
              git log --pretty=format:'- %s (%h)' HEAD
            fi
            echo
          } > RELEASE_NOTES.md

      - name: Create tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" -m "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ steps.version.outputs.version }}" \
            dist/subtrans-windows-amd64.exe \
            dist/subtrans-darwin-arm64 \
            --title "${{ steps.version.outputs.version }}" \
            --notes-file RELEASE_NOTES.md
