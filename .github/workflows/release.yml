name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Compute next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"
          if [[ -z "$latest" ]]; then
            next="v0.1.0"
          elif [[ "$latest" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            next="v${major}.${minor}.$((patch + 1))"
          else
            echo "Latest tag '$latest' is not semver-like" >&2
            exit 1
          fi

          echo "version=$next" >> "$GITHUB_OUTPUT"

      - name: Build assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/subtrans-windows-amd64/ffmpeg dist/subtrans-darwin-arm64/ffmpeg

          GOOS=windows GOARCH=amd64 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o dist/subtrans-windows-amd64/subtrans.exe .

          GOOS=darwin GOARCH=arm64 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o dist/subtrans-darwin-arm64/subtrans .

          base="https://github.com/descriptinc/ffmpeg-ffprobe-static/releases/download/b6.1.2-rc.1"
          curl -fsSL "$base/ffmpeg-win32-x64" -o dist/subtrans-windows-amd64/ffmpeg/ffmpeg.exe
          curl -fsSL "$base/ffprobe-win32-x64" -o dist/subtrans-windows-amd64/ffmpeg/ffprobe.exe
          curl -fsSL "$base/ffmpeg-darwin-arm64" -o dist/subtrans-darwin-arm64/ffmpeg/ffmpeg
          curl -fsSL "$base/ffprobe-darwin-arm64" -o dist/subtrans-darwin-arm64/ffmpeg/ffprobe
          chmod +x dist/subtrans-darwin-arm64/subtrans dist/subtrans-darwin-arm64/ffmpeg/ffmpeg dist/subtrans-darwin-arm64/ffmpeg/ffprobe

          (cd dist && zip -qr subtrans-windows-amd64.zip subtrans-windows-amd64)
          (cd dist && tar -czf subtrans-darwin-arm64.tar.gz subtrans-darwin-arm64)

      - name: Create tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" -m "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ steps.version.outputs.version }}" \
            dist/subtrans-windows-amd64.zip \
            dist/subtrans-darwin-arm64.tar.gz \
            --title "${{ steps.version.outputs.version }}" \
            --notes "Automated release for ${{ steps.version.outputs.version }}."
